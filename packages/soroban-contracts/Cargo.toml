# Soroban workspace — three production contracts for OpenX-S
#
# - agent-registry   : agent listings + KYA replacement
# - paywall-router   : x402-on-Stellar payment dispatch (95/5 USDC split)
# - paid-call-ledger : per-call revenue accumulator + dispute / refund
#
# Note: the Privacy Pool premium tier is provided by Nethermind's audited
# deployment (contracts/pool + asp-membership + asp-non-membership +
# CircomGroth16Verifier). We consume those as external cross-contracts —
# see docs/runbooks/ZK_DEPLOY.md and packages/api/src/services/stellar/
# privacyPool.ts. No local ZK contract lives in this workspace.
#
# Build:  cargo build --release --target wasm32-unknown-unknown
# Test :  cargo test --workspace

[workspace]
resolver = "2"
members = [
    "agent-registry",
    "paywall-router",
    "paid-call-ledger",
    "budget-vault",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Pham Nim <pham@openx.so>"]
license = "MIT"
publish = false

[workspace.dependencies]
soroban-sdk = "22.0.8"

[profile.release]
opt-level = "z"
overflow-checks = true
debug = 0
strip = "symbols"
debug-assertions = false
panic = "abort"
codegen-units = 1
lto = true
